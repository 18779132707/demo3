    <p>滕王阁位于江西南昌赣江东岸，是江南三大名楼之一，国家5A级景区 。始建于唐永徽四年（653年），为滕王李元婴所建，因王勃《滕王阁序》名扬天下 。今阁为1989年重建，仿宋风格，高57.5米，碧瓦飞檐，气势恢宏，登楼可尽览赣江风光 。</p>
